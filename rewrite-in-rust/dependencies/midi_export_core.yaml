unit: midi_export_core
status: done
capabilities:
  finite_note_filtering:
    legacy: "inference/io/note_io.py::_finite_notes"
    rust: "narrow implementation in rewrite-in-rust/rust/crates/v2m-core/src/midi_export.rs"
    reason: "MIDI export reuses the same scalar finite checks and offset > onset filtering as TXT/CSV export."
  midi_event_planning:
    legacy: "inference/io/note_io.py::_save_midi"
    rust: "narrow event planner in rewrite-in-rust/rust/crates/v2m-core/src/midi_export.rs"
    reason: "The Python path constructs a fixed subset of MIDI events from notes: set_tempo, optional lyrics, note_on, note_off, and end_of_track after save."
  tempo_and_tick_conversion:
    legacy: "inference/io/note_io.py::_save_midi plus mido.bpm2tempo"
    rust: "hand-written Python-compatible half-even rounding and tick conversion"
    reason: "The selected behavior needs only BPM-to-tempo conversion and absolute tick planning from scalar seconds; it does not need broad Mido playback or parsing APIs."
  midi_subset_encoding:
    legacy: "mido.MidiFile(charset='utf8').save"
    rust: "hand-written SMF type-1 single-track encoder for the selected message subset"
    reason: "Exact byte fixtures are smaller and more verifiable than adding a broad MIDI crate or reimplementing all Mido message families."
seam:
  kind: library
  default_owner: legacy
  bridge_dependencies: []
fixtures:
  required:
    - "rewrite-in-rust/fixtures/midi_export_core.jsonl must be the durable Python/Rust parity table."
    - "Fixtures must include sorted notes, overlapping notes, lyrics, invalid skipped notes, pitch clamping, minimum one-tick duration, tempo conversion, UTF-8 lyric encoding, and all-invalid input."
    - "Expected output must include both inspected MIDI events and exact MIDI file hex generated by legacy Python through Mido."
inventory_impact:
  decision: confirmed
  reason: "The unit boundary is confirmed for deterministic MIDI event planning and the small Mido SMF encoding subset used by _save_midi. Production filesystem writes, arbitrary MIDI APIs, and runtime export routing stay legacy-owned."
hand_written_replacements:
  - capability: "MIDI note export event and byte rendering"
    reference_sources:
      - "inference/io/note_io.py"
      - "third_party/sources/mido-1.3.3/mido/midifiles/units.py"
      - "third_party/sources/mido-1.3.3/mido/midifiles/meta.py"
      - "third_party/sources/mido-1.3.3/mido/midifiles/midifiles.py"
      - "third_party/sources/mido-1.3.3/mido/midifiles/tracks.py"
      - "third_party/sources/mido-1.3.3/mido/messages/messages.py"
      - "third_party/sources/mido-1.3.3/mido/messages/specs.py"
      - "third_party/sources/mido-1.3.3/mido/messages/checks.py"
      - "third_party/sources/numpy-1.26.4"
    reason: "The selected Mido behavior is a narrow, stable SMF subset: type-1 header, one track, UTF-8 lyrics meta events, set_tempo meta event, note_on/off channel messages, variable-length delta integers, and an automatic end_of_track event."
legacy_kept:
  - capability: "Production filesystem writes, parent directory creation, and status printing"
    reason: "No production bridge is introduced; _save_midi remains the runtime owner."
  - capability: "General Mido APIs"
    reason: "Ports, playback, parsing of arbitrary files, sysex, running-status edge cases outside the selected writer subset, and other meta/message types are not needed for _save_midi parity."
  - capability: "Model inference, quantization dispatch, USTX export, TXT/CSV export, and TextGrid artifacts"
    reason: "Those surfaces are owned by other manifest units or remain legacy-owned."
verification:
  - "uv run python rewrite-in-rust/bootstrap/check_midi_export_core.py"
  - "cargo test --manifest-path rewrite-in-rust/rust/Cargo.toml midi_export"
  - "cargo test --manifest-path rewrite-in-rust/rust/Cargo.toml"
  - "uv run python scripts/audit_vendored_sources.py"
