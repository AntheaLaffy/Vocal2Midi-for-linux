unit: slicer_segment_merge_core
status: done
capabilities:
  waveform_concat_and_silence:
    legacy: "inference/API/slicer_api.py::_concat_waveforms and _silence_like"
    rust: "future narrow waveform container in v2m-core supporting mono and channel-major stereo arrays"
    reason: "The required behavior is axis choice, zero-length slice shape, positive zero padding, and dtype-insensitive numeric fixture output."
  segment_duration_and_gap_math:
    legacy: "inference/API/slicer_api.py::_segment_duration_sec, _merged_duration_sec, and _merge_segments"
    rust: "future hand-written duration and merge implementation over offsets, sample rate, and waveform sample counts"
    reason: "The behavior is deterministic shape[-1] duration math, non-negative gap duration, Python round-to-even gap sample conversion, and offset preservation."
  short_segment_merge_policy:
    legacy: "inference/API/slicer_api.py::_merge_short_segments"
    rust: "future hand-written greedy scan plus reverse-tail and recursive retry behavior"
    reason: "The helper depends only on segment offsets, waveform lengths, min/max seconds, and merge_segments behavior."
  tiny_segment_merge_policy:
    legacy: "inference/API/slicer_api.py::_merge_tiny_chunks"
    rust: "future hand-written pending-head/body/tail tiny merge implementation"
    reason: "The helper depends only on segment offsets, waveform lengths, tiny_sec, and merge_segments behavior; fixtures preserve the legacy len(waveform)/sr stereo quirk."
seam:
  kind: library
  default_owner: legacy
  bridge_dependencies: []
fixtures:
  required:
    - "rewrite-in-rust/fixtures/slicer_segment_merge_core.jsonl is the durable Python/Rust parity table."
    - "Fixtures cover mono/stereo concat axis behavior, zero and positive silence shapes, merged duration with positive gaps, positive/overlapping/half-even/stereo segment merges, empty short/tiny inputs, forward short merge, combined-too-long skip, reverse tail merge, recursive retry behavior, leading/body/all/single tiny chunks, and the stereo tiny len(waveform) behavior."
inventory_impact:
  decision: confirmed
  reason: "The unit boundary is pure segment waveform container manipulation. Real silence detection, RMS calculation, default Slicer behavior, heuristic/grid policies, pitch/RMVPE smart splitting, librosa, ProcessPoolExecutor, ASR, SoundFile, and filesystem behavior remain outside this unit."
hand_written_replacements:
  - capability: "Slicer segment merge helpers"
    reference_sources:
      - "inference/API/slicer_api.py"
      - "third_party/sources/numpy-1.26.4"
    reason: "Only NumPy shape, slicing, concatenate, and zeros behavior is needed. A broad ndarray dependency is optional and a small fixture-bound waveform representation is enough for this migration unit."
legacy_kept:
  - capability: "RMS/default silence slicing"
    reason: "get_rms_db, inference.slicer.slicer2.Slicer, silence-tag selection, and default_slice are separate manifest units."
  - capability: "Heuristic/grid slicing policies"
    reason: "_sliding_window_split, heuristic_slice, and grid_search_slice include RMS/librosa and Slicer interactions that are planned separately."
  - capability: "Pitch/RMVPE smart slicing"
    reason: "get_pitch_curve, _pitch_based_split, pitch_based_slice, ProcessPoolExecutor behavior, and RMVPE voiced-mask policy are separate units and model execution stays legacy-owned."
  - capability: "Audio IO, ASR, SoundFile/libsndfile, FFmpeg, and argparse runtime behavior"
    reason: "This seam does not load audio, write files, run model inference, parse CLI argv, or invoke external binaries."
verification:
  - "uv run python rewrite-in-rust/bootstrap/check_slicer_segment_merge_core.py"
  - "cargo test --manifest-path rewrite-in-rust/rust/Cargo.toml slicer_segment"
  - "cargo test --manifest-path rewrite-in-rust/rust/Cargo.toml"
  - "uv run python scripts/audit_vendored_sources.py"
